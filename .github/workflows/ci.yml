name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-package:
    name: static + package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Compile source and tests
        run: |
          python -m compileall src tests
          python -m py_compile vendor/codex_bridge.py

      - name: Static contract tests
        run: |
          python tests/test_contracts.py
          python tests/test_bridge_contracts.py

      - name: Documentation drift tests
        run: python tests/test_docs.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Installed CLI smoke
        run: |
          python -m agent_tty --help >/dev/null
          k --help >/dev/null
          km --help >/dev/null
          python -m agent_tty --version
          k --version
          km --version
          agent-tty --version
          python -c "import agent_tty; print(agent_tty.__version__)"

  runtime:
    name: runtime tmux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tmux on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Build and install package
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install --force-reinstall dist/*.whl

      - name: Verify tmux
        run: tmux -V

      - name: Full runtime suite against installed k
        run: python tests/run_all.py k
